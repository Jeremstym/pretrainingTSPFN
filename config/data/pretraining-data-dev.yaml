defaults:
  - default

_target_: data.data_module_mantis.PretrainingMantisDataModule
train_datasets:
  2ChannelTUEV:
    _target_: data.pretraining_mantis.TUEV2ChannelDataset
    root: ${oc.env:TWOCHANS_TUEV_DATA_PATH}
    split: train
  3ChannelTUEV:
    _target_: data.pretraining_mantis.TUEV3ChannelDataset
    root: ${oc.env:THREECHANS_TUEV_DATA_PATH}
    split: train
val_datasets:
  2ChannelTUEV:
    _target_: data.pretraining_mantis.TUEV2ChannelDataset
    root: ${oc.env:TWOCHANS_TUEV_DATA_PATH}
    split: val
  3ChannelTUEV:
    _target_: data.pretraining_mantis.TUEV3ChannelDataset
    root: ${oc.env:THREECHANS_TUEV_DATA_PATH}
    split: val

